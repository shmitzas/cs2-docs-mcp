# docker-compose.yml for CS2 Docs MCP Server

services:
  cs2-docs-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - PYTHONUNBUFFERED=1
      - MAX_CONCURRENT_REQUESTS=100
      - FILE_CACHE_SIZE=500
      - CLEANUP_INTERVAL=300
      - RESULT_CACHE_TTL=60
    restart: unless-stopped
    # Increase file descriptor limits to prevent "too many open files" errors
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 65536
        hard: 65536
    # Add resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/sse || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./docs:/app/docs:ro  # Mount docs as read-only
      - ./logs:/app/logs
