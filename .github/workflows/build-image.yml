name: Build and Push CS2 Docs MCP Image

on:
  push:
    branches:
      - main
    # Only rebuild when something that lands inside the image (or the build
    # itself) changes. Docs/, README, monitor.py, deploy-docs.sh etc. don't
    # ship in the container so they don't need a new tag.
    paths:
      - 'doc-server.py'
      - 'requirements.txt'
      - 'update-all.sh'
      - 'update-swiftlys2.sh'
      - 'update-source2.sh'
      - 'update-cs2-gametracking.sh'
      - 'pterodactyl/Dockerfile.pterodactyl'
      - 'pterodactyl/entrypoint.sh'
      - '.github/workflows/build-image.yml'
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cs2-docs-mcp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # Build from repo root so COPY paths like `doc-server.py` and
          # `pterodactyl/entrypoint.sh` in the Pterodactyl Dockerfile resolve.
          context: .
          file: ./pterodactyl/Dockerfile.pterodactyl
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        run: echo ${{ steps.meta.outputs.digest }}
